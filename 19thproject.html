<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
    body{margin:0;font-family:Arial;display:flex;}
    .sidebar{
        width:200px;background:#222;color:white;min-height:100vh;
        padding:20px;
    }
    .sidebar h2{text-align:center;}
    .sidebar ul li{margin:15px 0;list-style:none;}
    .content{
        flex:1;padding:20px;background:#f2f2f2;
    }
    .cards{
        display:flex;gap:20px;
    }
    .card{
        flex:1;background:white;padding:20px;
        border-radius:10px;box-shadow:0 0 10px #888;
        text-align:center;
    }
</style>
</head>
<body>

<div class="sidebar">
    <h2>Dashboard</h2>
    <ul>
        <li>Home</li>
        <li>Analytics</li>
        <li>Messages</li>
        <li>Settings</li>
    </ul>
</div>

<div class="content">
    <h1>Welcome Back!</h1>

    <div class="cards">
        <div class="card">
            <h3>Users</h3>
            <p>1,230</p>
        </div>
        <div class="card">
            <h3>Sales</h3>
            <p>₹45,000</p>
        </div>
        <div class="card">
            <h3>Visitors</h3>
            <p>8,700</p>
        </div>
    </div>
</div>

</body>
</html>
