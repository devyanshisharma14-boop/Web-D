<!DOCTYPE html>
<html>
<head>
<title>Products</title>
<style>
    body{display:flex;gap:20px;padding:20px;font-family:Arial;}
    .card {
        width:250px;border:1px solid #ddd;border-radius:10px;
        padding:10px;text-align:center;
    }
    img {width:100%;border-radius:10px;}
</style>
</head>
<body>

<div class="card">
    <img src="https://picsum.photos/200" alt="">
    <h3>Product 1</h3>
    <p>$20</p>
    <button>Add to Cart</button>
</div>

<div class="card">
    <img src="https://picsum.photos/201" alt="">
    <h3>Product 2</h3>
    <p>$30</p>
    <button>Add to Cart</button>
</div>

</body>
</html>
