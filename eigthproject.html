<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
    body {background:#e3f2fd;font-family:sans-serif;}
    .box {
        width:300px;margin:120px auto;background:white;
        padding:30px;border-radius:10px;
        box-shadow:0 0 10px #555;
    }
    input {width:100%;padding:10px;margin:10px 0;}
    button {width:100%;padding:10px;background:#1976d2;color:white;border:0;}
</style>
</head>
<body>

<div class="box">
    <h2>Login</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Login</button>
</div>

</body>
</html>
